name: Python CI

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/python.yaml"
      - "pyproject.toml"
      - "*.py"
      - "golden/**"
      - "examples/**"
  pull_request:
    branches: [master, main]
    paths:
      - ".github/workflows/python.yaml"
      - "pyproject.toml"
      - "*.py"
      - "golden/**"
      - "examples/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v
        env:
          CI: "true"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting with Ruff
        run: python -m ruff format --check .

      - name: Run Ruff linter
        run: python -m ruff check .
