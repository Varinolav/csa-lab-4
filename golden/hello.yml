in_source: |
  : emit-str
      dup load
      swap 4 +
      swap
      begin
          dup 0 >
      while
          over load
          1 out
          swap 4 + swap
          1 -
      repeat
      drop drop
  ;

  : main
      ." Hello, World!"
  ;

  main
