in_source: |
  variable counter = 100
  variable step = 5

  : print-int
      dup 0 =
      if
          48 1 out
      else
          dup 10 /
          dup 0 >
          if
              print-int
          else
              drop
          then
          10 mod
          48 + 1 out
      then
  ;

  : newline
      10 1 out
  ;

  : main
      counter load print-int newline
      step load print-int newline
      counter load step load + counter store
      counter load print-int newline
  ;

  main
